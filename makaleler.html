    <h1 class="page-title fade-in">Yazılar & Analizler</h1>

    <div class="article-list" id="articleList">
      <p style="color:var(--text-muted);font-style:italic;font-size:0.9rem;">Yükleniyor…</p>
    </div>

    <script>
    (function () {
      function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function formatDate(d) {
        if (!d) return '';
        return new Date(d).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
      }

      fetch('makaleler/data/index.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(articles) {
          var list = document.getElementById('articleList');
          if (!articles.length) {
            list.innerHTML = '<p style="color:var(--text-muted)">Henüz makale yok.</p>';
            return;
          }
          list.innerHTML = articles.map(function(a) {
            var href = a.legacy ? a.legacyUrl : ('makaleler/article.html?slug=' + a.slug);
            var tags = (a.tags || []).map(function(t) { return '[' + esc(t) + ']'; }).join(', ');
            var reading = a.readingTime ? '~ ' + a.readingTime + ' dk' : '';
            return '<article class="article-item fade-in">' +
              '<div class="article-meta">' +
                '<span>' + esc(formatDate(a.date)) + '</span>' +
                (tags ? '<span>' + esc(tags) + '</span>' : '') +
                (reading ? '<span>' + reading + '</span>' : '') +
              '</div>' +
              '<a href="' + esc(href) + '" class="article-title">' + esc(a.title) + '</a>' +
              (a.description ? '<p class="article-excerpt">' + esc(a.description) + '</p>' : '') +
              '<a href="' + esc(href) + '" class="read-more">→ devamını oku</a>' +
            '</article>';
          }).join('');
        })
        .catch(function() {
          document.getElementById('articleList').innerHTML =
            '<p style="color:#ff6b6b;font-family:monospace">Makale listesi yüklenemedi.</p>';
        });
    })();
    </script>
